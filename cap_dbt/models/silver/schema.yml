version: 2

models:
  - name: silver_customers
    description: "Cleaned customers from RAW layer"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: customer_name
        tests:
          - not_null

  - name: silver_orders
    description: "Cleaned orders from RAW layer"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null

  - name: silver_nations
    description: "Cleaned nations from RAW layer"
    columns:
      - name: nation_id
        tests:
          - not_null
          - unique

  - name: silver_regions
    description: "Cleaned regions from RAW layer"
    columns:
      - name: region_id
        tests:
          - not_null
          - unique

  - name: silver_lineitems
    description: "Cleaned line items from RAW layer"
    columns:
      - name: order_id
        tests:
          - not_null